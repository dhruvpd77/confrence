{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICRAET 2026 — Faculty Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page faculty-login-page">
    <div class="login-bg-pattern"></div>
    <div class="login-wrapper faculty-login-wrapper">
        <div class="login-hero compact">
            <div class="login-logos">
                <img src="{% static 'img/ljiet-logo.png' %}" alt="LJIET" class="login-logo">
                <img src="{% static 'img/lju-logo.png' %}" alt="LJ University" class="login-logo">
            </div>
            <h1>Faculty Portal</h1>
            <p class="login-tagline">ICRAET 2026 — Moderator-2 (Entry) Marks Entry</p>
        </div>

        <div class="login-card faculty-card">
            <div class="login-card-header faculty-header">
                <h2>Faculty Login</h2>
                <p>Enter your Login ID and 4-digit password</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-error">Invalid Login ID or password. Contact admin for credentials.</div>
            {% endif %}
            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Login ID</label>
                    <input type="text" name="username" id="id_username" required autofocus placeholder="e.g. shruti.raval">
                </div>
                <div class="form-group">
                    <label for="id_password">Password (4 digits)</label>
                    <input type="password" name="password" id="id_password" required maxlength="4" pattern="[0-9]{4}" placeholder="••••">
                </div>
                <button type="submit" class="btn btn-accent btn-full">Login</button>
            </form>
            <a href="{% url 'login' %}" class="back-link">← Back to Admin Login</a>
        </div>
    </div>
</body>
</html>
