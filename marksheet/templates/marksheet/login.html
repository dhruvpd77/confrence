{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ICRAET 2026 — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-bg-glow"></div>
    <div class="login-bg-grid"></div>

    <div class="login-shell">
        <section class="login-brand-panel animate-fade-in">
            <div class="conference-logo-wrap">
                <img src="{% static 'img/icraet-logo.png' %}" alt="ICRAET 2026" class="conference-logo">
            </div>
            <div class="logo-showcase">
                <div class="logo-tile logo-tile-lju">
                    <img src="{% static 'img/lju-logo.png' %}" alt="LJ University" class="brand-logo brand-logo-lju">
                </div>
                <div class="logo-tile logo-tile-ljiet">
                    <img src="{% static 'img/ljiet-logo-sif.png' %}" alt="LJIET" class="brand-logo brand-logo-ljiet">
                </div>
            </div>
            <h1 class="login-title">ICRAET 2026</h1>
            <p class="login-subtitle">International Conference on Recent Advances in Engineering &amp; Technology</p>
            <div class="login-meta">
                <span class="meta-pill">12 – 13 June 2026</span>
                <span class="meta-pill gold">LJ University</span>
            </div>
        </section>

        <section class="login-form-panel animate-slide-up">
            <div class="login-form-card">
                <div class="login-form-conference-logo">
                    <img src="{% static 'img/icraet-logo.png' %}" alt="ICRAET 2026">
                </div>
                <div class="login-form-header">
                    <h2>Welcome Back</h2>
                </div>

                {% if form.errors %}
                <div class="alert alert-error">
                    Invalid Login ID or password. Please try again.
                </div>
                {% endif %}

                <form method="post" class="login-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="id_username">Login ID / Username</label>
                        <input type="text" name="username" id="id_username" required autofocus
                               placeholder="Username" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="id_password">Password</label>
                        <input type="password" name="password" id="id_password" required
                               placeholder="Enter password" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-gold btn-full btn-login">
                        <span>Sign In</span>
                    </button>
                </form>
            </div>
        </section>
    </div>
</body>
</html>
