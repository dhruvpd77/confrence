{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICRAET 2026 — Super Admin Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">IC</div>
                <h1>ICRAET 2026</h1>
                <p>Conference Marksheet Management System</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-error">
                Invalid username or password. Super admin access only.
            </div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" required autofocus placeholder="Enter super admin username">
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login as Super Admin</button>
            </form>
        </div>
    </div>
</body>
</html>
